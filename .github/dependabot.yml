version: 2

updates:
  - package-ecosystem: "npm"
    directories: 
      - "/"
      - "/apps/api"
      - "/apps/web"
      - "/packages/shared/*"
      
    schedule:
      interval: weekly

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly

    commit-message:
      prefix: "docker"

    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly

    commit-message:
      prefix: "ci"

    labels:
      - "dependencies"
      - "ci"